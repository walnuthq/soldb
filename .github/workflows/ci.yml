name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_VERSION: v1.0.0

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

  lit:
    name: lit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install system test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq llvm
          LLVM_BIN="$(dirname "$(find /usr/lib/llvm-* -name FileCheck | sort -V | tail -1)")"
          echo "$LLVM_BIN" >> "$GITHUB_PATH"

      - name: Install lit
        run: python -m pip install lit

      - name: Install Solidity compilers
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"

          curl -fsSL \
            -o "$HOME/.local/bin/solc-0.8.31" \
            https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.31+commit.fd3a2265
          echo "aac9cd0116e9ae0cd3d8f64a8641381845dc9f12e2a52653de36fb619323e557  $HOME/.local/bin/solc-0.8.31" | sha256sum -c -

          curl -fsSL \
            -o "$HOME/.local/bin/solc-0.8.16" \
            https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.16+commit.07a7930e
          echo "1632786c6c1f856a4a899232ec975a12f305118f43cce90e724ed0b2eebfeee1  $HOME/.local/bin/solc-0.8.16" | sha256sum -c -

          chmod +x "$HOME/.local/bin/solc-0.8.31" "$HOME/.local/bin/solc-0.8.16"
          ln -sf "$HOME/.local/bin/solc-0.8.31" "$HOME/.local/bin/solc"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build Rust binaries
        run: cargo build --bin soldb --bin soldb-dap-server

      - name: Run lit tests
        run: |
          set -euo pipefail
          anvil --steps-tracing --host 127.0.0.1 --port 8545 > anvil.log 2>&1 &
          ANVIL_PID=$!
          trap 'kill "$ANVIL_PID"' EXIT

          for _ in {1..30}; do
            if curl -fsS \
              -X POST \
              -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              http://127.0.0.1:8545 > /dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            http://127.0.0.1:8545 > /dev/null; then
            cat anvil.log
            exit 1
          fi

          RPC_URL=http://127.0.0.1:8545 ./test/run-tests.sh

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Rust coverage tool
        run: cargo install cargo-llvm-cov --locked

      - name: Run Rust coverage
        run: cargo llvm-cov --workspace --all-targets --cobertura --output-path rust-coverage.xml --fail-under-lines 80

      - uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust-coverage.xml
